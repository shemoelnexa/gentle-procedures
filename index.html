<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gentle Procedures Dubai — Homepage Concepts</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%233FA7B6'/%3E%3C/svg%3E">
<style>
@font-face{font-family:'Canela';src:url('assets/fonts/canela-light.woff2') format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'Sohne';src:url('assets/fonts/sohne-buch.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Sohne';src:url('assets/fonts/sohne-kraftig.woff2') format('woff2');font-weight:500;font-display:swap}
:root{--teal:#3FA7B6;--first-light:#F0DCCB;--alabaster:#F7F4EF;--navy:#1C2B45;--ink:#2E2A26;--night:#0C1220;
  --serif:'Canela',Georgia,serif;--sans:'Sohne','Helvetica Neue',Arial,sans-serif;--ease:cubic-bezier(.22,1,.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--night);color:#fff;overflow:hidden;height:100svh}
a{text-decoration:none;color:inherit}
.head{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:1.5rem clamp(1.5rem,4vw,3.5rem);pointer-events:none}
.head .logo{height:clamp(30px,3vw,40px);width:auto}
.split{display:flex;height:100svh;width:100%}
.panel{position:relative;flex:1;overflow:hidden;display:flex;align-items:flex-end;transition:flex .8s var(--ease);cursor:pointer}
.panel:hover{flex:1.35}
.panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 1.2s var(--ease),filter .8s}
.panel:hover img{transform:scale(1.05)}
.panel .ov{position:absolute;inset:0;transition:opacity .6s}
.pa img{filter:saturate(1.02)}
.pa .ov{background:linear-gradient(180deg,rgba(247,244,239,.1),rgba(240,220,203,.25) 60%,rgba(28,43,69,.55))}
.pb img{filter:grayscale(1) brightness(.6) contrast(1.05)}
.pb .ov{background:linear-gradient(180deg,rgba(12,18,32,.4),rgba(12,18,32,.35) 45%,rgba(12,18,32,.9))}
.inner{position:relative;z-index:2;padding:clamp(2rem,5vw,4.5rem);width:100%}
.title{font-family:var(--serif);font-weight:300;font-size:clamp(2.4rem,5vw,5rem);line-height:1;letter-spacing:-.02em;color:#fff}
.enter{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.8rem;background:var(--teal);color:#fff;font-weight:500;
  font-size:.85rem;padding:.8rem 1.5rem;border-radius:100px;transition:transform .4s var(--ease),gap .4s;pointer-events:auto}
.enter:hover{transform:translateY(-2px);gap:1rem}
.divider{width:1px;background:rgba(255,255,255,.15);z-index:5}
@media(max-width:820px){
  body{overflow:auto;height:auto}
  .split{flex-direction:column;height:auto}
  .panel{min-height:78svh}.panel:hover{flex:1}
}
</style>
</head>
<body>
<div class="head">
  <img class="logo" src="assets/img/logo.png" alt="Gentle Procedures Clinic">
</div>
<div class="split">
  <a class="panel pa" href="concept-a.html">
    <img src="assets/img/hero-handA.jpg" alt="Concept 1">
    <div class="ov"></div>
    <div class="inner">
      <div class="title">Concept 1</div>
      <span class="enter">Enter →</span>
    </div>
  </a>
  <div class="divider"></div>
  <a class="panel pb" href="concept-b.html">
    <img src="assets/img/hero-handB.jpg" alt="Concept 2">
    <div class="ov"></div>
    <div class="inner">
      <div class="title">Concept 2</div>
      <span class="enter">Enter →</span>
    </div>
  </a>
</div>
</body>
</html>
