<!DOCTYPE html>
<!-- Gentle Procedures Dubai . Homepage concepts, internal review gallery. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gentle Procedures Concepts</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preload" href="assets/fonts/sohne-extrafett.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/canela-light-italic.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face{font-family:'Canela';src:url('assets/fonts/canela-light-italic.woff2') format('woff2');font-weight:300;font-style:italic;font-display:swap}
  @font-face{font-family:'Sohne';src:url('assets/fonts/sohne-buch.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:'Sohne';src:url('assets/fonts/sohne-kraftig.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:'Sohne';src:url('assets/fonts/sohne-extrafett.woff2') format('woff2');font-weight:800;font-style:normal;font-display:swap}
  @font-face{font-family:'SohnePunct';src:url('assets/fonts/inter-400.woff2') format('woff2');font-weight:400;font-display:swap}
  :root{--alabaster:#F7F4EF;--travertine:#E9E2D7;--pale-oak:#D6C7B0;--navy:#1C2B45;--teal:#3FA7B6;--first-light:#F0DCCB;--ink:#2E2A26;--greige:#C5B8AD;--muted:rgba(46,42,38,.64);
    --display:'Canela',Georgia,serif;--body:'Sohne','SohnePunct',system-ui,-apple-system,Arial,sans-serif;--e:cubic-bezier(.22,.61,.36,1)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--body);font-weight:400;color:var(--ink);background:var(--alabaster);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1360px;margin:0 auto;padding:0 clamp(24px,5vw,72px)}
  header{padding:clamp(64px,12vh,130px) 0 clamp(40px,6vh,70px)}
  header .display{font-family:var(--body);font-weight:800;text-transform:uppercase;font-size:clamp(1.7rem,4vw,3.2rem);line-height:1;letter-spacing:-.015em}
  header .display em{font-family:var(--display);font-weight:300;font-style:italic;text-transform:none;color:var(--navy);letter-spacing:-.01em}
  header .rule{height:1px;background:var(--pale-oak);margin-top:clamp(40px,6vh,66px);position:relative}
  header .rule::before{content:"";position:absolute;left:0;top:-1px;width:44px;height:3px;background:var(--navy)}
  main{padding-bottom:clamp(80px,14vh,160px)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(24px,2.6vw,44px)}
  .card{display:block;opacity:0;transform:translateY(22px);transition:opacity .8s var(--e),transform .8s var(--e)}
  .card.in{opacity:1;transform:none}
  .card .shot{aspect-ratio:16/10;overflow:hidden;border-radius:5px;background:var(--travertine);position:relative;box-shadow:0 30px 60px -42px rgba(28,43,69,.5)}
  .card .shot img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform 1.1s var(--e)}
  .card .meta{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-top:20px}
  .card .nm{font-family:var(--display);font-weight:300;font-size:1.5rem;letter-spacing:-.01em}
  .card .open{font-family:var(--body);font-weight:500;font-size:.78rem;letter-spacing:.09em;text-transform:uppercase;color:var(--navy);border-bottom:1px solid var(--pale-oak);padding-bottom:4px;white-space:nowrap;transition:border-color .3s}
  .card:hover .open{border-color:var(--navy)}
  @media(hover:hover) and (pointer:fine){.card:hover .shot img{transform:scale(1.04)}}
  @media(max-width:920px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1 class="display">Gentle Procedures <em>Concepts.</em></h1>
    <div class="rule"></div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <a class="card" href="concept-1.html" target="_blank" rel="noopener">
      <div class="shot"><img src="assets/thumbs/c1.png" alt="Concept 1"></div>
      <div class="meta"><span class="nm">Concept 1</span><span class="open">Open concept</span></div>
    </a>
    <a class="card" href="concept-2.html" target="_blank" rel="noopener">
      <div class="shot"><img src="assets/thumbs/c2.png" alt="Concept 2"></div>
      <div class="meta"><span class="nm">Concept 2</span><span class="open">Open concept</span></div>
    </a>
    <a class="card" href="concept-3.html" target="_blank" rel="noopener">
      <div class="shot"><img src="assets/thumbs/c3.png" alt="Concept 3"></div>
      <div class="meta"><span class="nm">Concept 3</span><span class="open">Open concept</span></div>
    </a>
    <a class="card" href="concept-a.html" target="_blank" rel="noopener">
      <div class="shot"><img src="assets/thumbs/a.png" alt="Concept 4"></div>
      <div class="meta"><span class="nm">Concept 4</span><span class="open">Open concept</span></div>
    </a>
    <a class="card" href="concept-b.html" target="_blank" rel="noopener">
      <div class="shot"><img src="assets/thumbs/b.png" alt="Concept 5"></div>
      <div class="meta"><span class="nm">Concept 5</span><span class="open">Open concept</span></div>
    </a>
  </div>
</main>

<script>
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});
  document.querySelectorAll('.card').forEach(function(c){io.observe(c)});
</script>
</body>
</html>
